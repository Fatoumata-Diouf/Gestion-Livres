name: CI/CD Pipeline — master2

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1 : Build & Push image Docker ────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    steps:
      # Étape 1 — Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 — Installer Java 25
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # Étape 3 — Générer la version à partir du numéro de run
      - name: Set version
        id: version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # Étape 4 — Builder le JAR
      - name: Build JAR
        run: mvn package -DskipTests

      # Étape 5 — Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Étape 6 — Builder et pousser l'image avec version + latest
      # Ex : monuser/master2:1.0.42  ET  monuser/master2:latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/master2:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/master2:latest